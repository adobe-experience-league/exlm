name: Jira to PR

on:
  repository_dispatch:
    types: [jira-build]
  workflow_dispatch:
    inputs:
      ticket:
        description: 'JIRA ticket key (e.g. EXLM-1234)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  auto-build:
    # Only the canonical exlm repo (not exlm-stage or other copies).
    if: github.repository == 'adobe-experience-league/exlm'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve and validate ticket
        id: ticket
        # Pass untrusted trigger input via env, never interpolated directly into the
        # script — prevents shell injection (CWE-78) from client_payload.ticket.
        env:
          RAW_TICKET: ${{ github.event.client_payload.ticket || github.event.inputs.ticket }}
        run: |
          TICKET="$RAW_TICKET"
          if [[ ! "$TICKET" =~ ^[A-Z]+-[0-9]+$ ]]; then
            echo "::error::Invalid or missing ticket key. Expected PROJECT-NUMBER (e.g. EXLM-1234)."
            exit 1
          fi
          echo "ticket=$TICKET" >> "$GITHUB_OUTPUT"
          echo "Resolved ticket: $TICKET"

      - name: Restore AI skills
        run: npx skills experimental_install --yes

      # The auto-build skill is committed to this branch (force-added past .gitignore
      # for testing). npx skills installs lock-listed skills but not this one, so make
      # sure the .claude/skills entry resolves after install — self-heal the symlink
      # from the committed .agents copy if the install step removed it.
      - name: Ensure auto-build skill is installed
        run: |
          mkdir -p .claude/skills
          if [ ! -e .claude/skills/auto-build ]; then
            ln -s ../../.agents/skills/auto-build .claude/skills/auto-build
          fi
          if [ ! -f .claude/skills/auto-build/SKILL.md ]; then
            echo "::error::auto-build skill missing — neither .claude/skills/auto-build nor .agents/skills/auto-build resolved."
            exit 1
          fi
          echo "auto-build skill resolved."

      # The skill runs git commit; a fresh runner has no committer identity.
      - name: Configure git identity
        run: |
          git config user.name "exlm-auto-build[bot]"
          git config user.email "exlm-auto-build@users.noreply.github.com"

      - uses: anthropics/claude-code-action@v1
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_PAT: ${{ secrets.JIRA_PAT }}
          GITHUB_TOKEN: ${{ secrets.UPDATE_PR_GITHUB_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            /auto-build ${{ steps.ticket.outputs.ticket }}
          claude_args: |
            --max-turns 200
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,TodoWrite,Skill,WebFetch,WebSearch"
