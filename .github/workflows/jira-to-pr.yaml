name: Jira to PR

on:
  repository_dispatch:
    types: [jira-build]
  workflow_dispatch:
    inputs:
      ticket:
        description: 'JIRA ticket key (e.g. EXLM-1234)'
        required: true
        type: string
  # TEMPORARY (testing only): lets this workflow run from the feature branch before
  # it is merged to the default branch (repository_dispatch / workflow_dispatch only
  # work from the default branch). The ticket comes from the TEST_TICKET Actions
  # variable. Remove this whole `push` block before merging to main.
  push:
    branches: [jira-to-pr-automation]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  auto-build:
    # Only the canonical exlm repo (not exlm-stage or other copies).
    if: github.repository == 'adobe-experience-league/exlm'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve and validate ticket
        id: ticket
        run: |
          # vars.TEST_TICKET is the fallback used by the temporary push trigger.
          TICKET="${{ github.event.client_payload.ticket || github.event.inputs.ticket || vars.TEST_TICKET }}"
          if [[ ! "$TICKET" =~ ^[A-Z]+-[0-9]+$ ]]; then
            echo "::error::Invalid or missing ticket key: '$TICKET'. Expected PROJECT-NUMBER (e.g. EXLM-1234). For push-triggered test runs, set the TEST_TICKET Actions variable."
            exit 1
          fi
          echo "ticket=$TICKET" >> "$GITHUB_OUTPUT"
          echo "Resolved ticket: $TICKET"

      - name: Restore AI skills
        run: npx skills experimental_install --yes

      # The auto-build skill is committed to this branch (force-added past .gitignore
      # for testing). Fail loudly if it is not resolvable after the install step so a
      # missing skill surfaces here rather than as a confusing agent error.
      - name: Verify auto-build skill is present
        run: |
          if [ ! -f .claude/skills/auto-build/SKILL.md ]; then
            echo "::error::.claude/skills/auto-build/SKILL.md not found — the auto-build skill is missing from the checkout."
            exit 1
          fi
          echo "auto-build skill resolved."

      - uses: anthropics/claude-code-action@v1
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_PAT: ${{ secrets.JIRA_PAT }}
          GITHUB_TOKEN: ${{ secrets.UPDATE_PR_GITHUB_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            /auto-build ${{ steps.ticket.outputs.ticket }}
          claude_args: |
            --max-turns 80
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,TodoWrite"
