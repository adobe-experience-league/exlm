name: Claude PR Review
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    # Only the canonical exlm repo (not exlm-stage or other copies). Includes PRs from forks into exlm.
    if: github.repository == 'adobe-experience-league/exlm'
    runs-on: ubuntu-latest
    steps:
      # Required: the action runs git against the workspace (e.g. fetch origin/main for trusted files).
      # Without checkout there is no .git and git fetch fails.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore AI skills
        run: npx skills experimental_install --yes

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            EVENT: ${{ github.event_name }} / ${{ github.event.action }}

            The PR branch is already checked out in the current working directory.
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) for line-specific issues.
            Use `gh pr comment` for summary feedback if helpful.

            CRITICAL — before posting any finding:
            1. Fetch all existing review comments and thread replies for this PR.
            2. Fetch all PR-level (issue) comments.
            3. Read the "AI Review Notes" section in the PR description.
            4. Do NOT open a new inline comment on any file:line that already has a review thread.
            5. Treat every bullet in "AI Review Notes" as an accepted decision — do not flag it.
            6. If a developer replied to a previous finding with a justification, accept it and move on.

            /code-review ${{ github.event.pull_request.number }}
          claude_args: |
            --max-turns 25
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(git diff:*),Bash(git log:*),Read,Glob,Grep"
