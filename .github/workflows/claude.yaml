name: Claude PR Review
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    # Only the canonical exlm repo (not exlm-stage or other copies). Includes PRs from forks into exlm.
    if: github.repository == 'adobe-experience-league/exlm'
    runs-on: ubuntu-latest
    steps:
      # Required: the action runs git against the workspace (e.g. fetch origin/main for trusted files).
      # Without checkout there is no .git and git fetch fails.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore AI skills
        run: npx skills experimental_install --yes

      - name: Fetch existing PR conversation
        env:
          GH_TOKEN: ${{ secrets.UPDATE_PR_GITHUB_TOKEN }}
        run: |
          PR="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          gh api "repos/$REPO/pulls/$PR/comments" \
            --jq '[.[] | {path, line: (.line // .original_line), author: .user.login, body, in_reply_to_id}]' \
            > pr-review-comments.json
          gh api "repos/$REPO/issues/$PR/comments" \
            --jq '[.[] | {author: .user.login, body}]' \
            > pr-issue-comments.json

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            The PR branch is already checked out in the current working directory.

            SANDBOXED CI RUN â€” you only have these tools: mcp__github_inline_comment__create_inline_comment,
            `gh pr comment`, `gh pr diff`, `gh pr view`, `git diff`, `git log`, Read, Glob, Grep.
            The /code-review skill also describes screenshot capture (Playwright/node), `gh api` calls for
            posting comments/reviews/suggestions, `git commit`/`push`/`checkout` (Fix Commits), and `npm run
            lint` â€” NONE of those are available here, so skip those parts of the skill entirely rather than
            attempting them:
            - Skip Step 5 (visual screenshots) â€” no browser tooling is available.
            - Skip Step 9's GitHub Suggestions (`gh api .../reviews`) and Fix Commits â€” post plain findings
              instead, with `mcp__github_inline_comment__create_inline_comment` for line-specific issues and
              `gh pr comment` for a single summary comment.
            - Skip running `npm run lint` or any other build/test command.

            Prior review context has been pre-fetched into the working directory:
            - pr-review-comments.json â€” all existing inline review comments (path, line, author, body, reply chain)
            - pr-issue-comments.json â€” all general PR comments (often contain developer explanations, ignore instructions, and decisions)

            CRITICAL â€” load both files into context ONCE at the start of the review, then hold onto that context for the rest of the review:
            1. Do NOT open a new inline comment on any file:line that already has an entry in pr-review-comments.json.
            2. If a developer replied to a previous finding with a justification or an "ignore" instruction, accept it and do not re-flag â€” check every candidate finding against this loaded context before posting it.
            3. Read the "AI Review Notes" section in the PR description and treat every bullet as an accepted decision.

            EFFICIENCY â€” to stay within the turn budget:
            4. Do not re-fetch pr-review-comments.json, pr-issue-comments.json, the PR diff, or the PR description more than once â€” you already have everything you need from the initial read. Cross-check findings against that in-memory context rather than re-reading files from disk.
            5. Build your complete list of findings first, then post all inline comments in sequence at the end, rather than alternating between analysis and posting.

            /code-review ${{ github.event.pull_request.number }}
          claude_args: |
            --max-turns 25
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(git diff:*),Bash(git log:*),Read,Glob,Grep"
