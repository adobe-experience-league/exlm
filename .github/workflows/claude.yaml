name: Claude PR Review
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    # Only the canonical exlm repo (not exlm-stage or other copies). Includes PRs from forks into exlm.
    if: github.repository == 'adobe-experience-league/exlm'
    runs-on: ubuntu-latest
    steps:
      # Required: the action runs git against the workspace (e.g. fetch origin/main for trusted files).
      # Without checkout there is no .git and git fetch fails.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Follow the EDS code-review skill in PR Review Mode as defined in `.agents/skills/code-review/SKILL.md`.
            Skip Step 5 (visual screenshots — no browser available in CI).

            Scope rules (strict — do not relax):
            - Only analyze files and hunks returned by the PR diff.
            - Only report issues introduced by this PR, not pre-existing ones.
            - If out-of-diff context is needed, note it once in a summary comment, not as an inline comment.

            Note: The PR branch is already checked out in the current working directory.
          claude_args: |
            --max-turns 25
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*),Bash(npm run lint:*),Bash(git diff:*),Bash(git status:*),Read,Glob,Grep"
